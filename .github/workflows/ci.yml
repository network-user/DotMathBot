name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # GitHub Actions can't run testcontainers reliably (no DinD), so we
    # pre-provision Postgres as a service and point DOTMATH_TEST_DB_URL at it.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dotmath
          POSTGRES_PASSWORD: dotmath
          POSTGRES_DB: dotmath_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dotmath -d dotmath_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DOTMATH_TEST_DB_URL: postgresql+asyncpg://dotmath:dotmath@localhost:5432/dotmath_test
      BOT_TOKEN: "123:test"
      ADMIN_BACKUP_PASSWORD: "test-pass"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Prod lock (hashed) + dev/test lock. Prod image installs only the former.
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build-image:
    # Sanity-check that the Docker image builds. Doesn't push anywhere.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build bot image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: false
          tags: dotmath-bot:ci
