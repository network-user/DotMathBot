name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # GitHub Actions can't run testcontainers reliably (no DinD), so we
    # pre-provision Postgres as a service and point DOTMATH_TEST_DB_URL at it.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dotmath
          POSTGRES_PASSWORD: dotmath
          POSTGRES_DB: dotmath_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dotmath -d dotmath_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DOTMATH_TEST_DB_URL: postgresql+asyncpg://dotmath:dotmath@localhost:5432/dotmath_test
      BOT_TOKEN: "123:test"
      ADMIN_BACKUP_PASSWORD: "test-pass"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build-image:
    # Sanity-check that the Docker image builds. Doesn't push anywhere.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: dotmath-bot:ci
