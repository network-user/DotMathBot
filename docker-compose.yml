services:
  postgres:
    image: postgres:16-alpine
    container_name: dotmath-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dotmath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-dotmath}
    # Postgres доступен только внутри docker-сети (бот подключается по имени "postgres").
    # Для ручного доступа с сервера раскомментируйте строку ниже:
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dotmath} -d ${POSTGRES_DB:-dotmath}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dotmath

  bot:
    build: .
    image: dotmathbot-bot
    container_name: dotmath-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - bot_data:/app/app/data
    networks:
      - dotmath

volumes:
  pgdata:
  bot_data:

networks:
  dotmath:
    driver: bridge
